name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-orb:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend deps
        working-directory: orb
        run: pnpm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: orb
          tagName: ${{ github.ref_name }}
          releaseName: "Jarvis Orb ${{ github.ref_name }}"
          releaseBody: |
            ## Jarvis Orb — AI Brain Visualizer

            ### Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/thestack-ai/jarvis-orb/main/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/thestack-ai/jarvis-orb/main/install.ps1 | iex
            ```
          releaseDraft: true
          args: --target ${{ matrix.target }}

  checksums:
    needs: build-orb
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --dir assets || true

      - name: Generate SHA256SUMS
        run: |
          if ls assets/* 1>/dev/null 2>&1; then
            cd assets && shasum -a 256 * > SHA256SUMS
          fi

      - name: Upload SHA256SUMS
        if: hashFiles('assets/SHA256SUMS') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} assets/SHA256SUMS --repo ${{ github.repository }} --clobber

  build-brain:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: brain-macos
          - os: windows-latest
            name: brain-windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        working-directory: brain
        run: |
          pip install aiosqlite websockets pyinstaller

      - name: Build Brain binary
        working-directory: brain
        shell: bash
        run: |
          pyinstaller --onefile --name jarvis-brain --hidden-import jarvis_brain.memory --hidden-import jarvis_brain.entities --hidden-import jarvis_brain.event_emitter --hidden-import jarvis_brain.schemas --hidden-import jarvis_brain.config jarvis_brain/mcp_server.py

      - name: Upload Brain artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: brain/dist/jarvis-brain*
