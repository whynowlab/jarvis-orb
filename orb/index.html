<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis Orb</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    }
    #orb-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #log-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 200px;
      padding: 8px 12px;
      background: linear-gradient(to top, rgba(13, 13, 18, 0.95), transparent);
      display: none;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }
    #log-panel.visible { display: flex; }
    .log-line {
      font-size: 11px;
      line-height: 1.6;
      color: rgba(138, 138, 153, 0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-line:last-child { color: #fff; }
    .log-tag { color: #00F0FF; font-weight: bold; margin-right: 6px; }
  </style>
</head>
<body>
  <div id="drag-region" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:2;-webkit-app-region:drag;"></div>
  <canvas id="orb-canvas" style="position:relative;z-index:1;"></canvas>
  <div id="log-panel"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
